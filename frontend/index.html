<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="logo.png?v=3" />
    <link rel="icon" type="image/png" href="favicon-32x32.png?v=3" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0891b2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="طبيبي - منصة حجز المواعيد الطبية في الجزائر" />
    <title>طبيبي — Tabibi | حجز المواعيد الطبية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Mode (Premium) */
        --brand:          #0891b2;
        --brand-dark:     #0e7490;
        --brand-light:    rgba(8, 145, 178, 0.08);
        --border:         #e2e8f0;
        --bg:             #f8fafc;
        --card-bg:        rgba(255, 255, 255, 0.9);
        --text-main:      #0f172a;
        --text-secondary: #475569;
        --text-muted:     #94a3b8;
        --nav-bg:         rgba(255, 255, 255, 0.75);
        --glass-bg:       rgba(255, 255, 255, 0.7);
        --glass-border:   rgba(255, 255, 255, 0.4);
        --glass-blur:     blur(12px);
        --heading-color:  #0c4a6e;
        --btn-text:       #ffffff;
        --input-bg:       #ffffff;

        --radius:       16px;
        --radius-sm:    10px;
        --radius-lg:    20px;
        --radius-xl:    32px;
        --shadow-sm:    0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow:       0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --shadow-lg:    0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        --shadow-brand: 0 10px 15px -3px rgba(8, 145, 178, 0.2);
      }

      [data-theme="dark"] {
        /* Dark Mode (High-End iOS/Android Style) */
        --brand:          #00d2df;
        --brand-dark:     #0891b2;
        --brand-light:    rgba(0, 210, 223, 0.1);
        --border:         rgba(255, 255, 255, 0.08);
        --bg:             #0a0f16;
        --card-bg:        rgba(30, 41, 59, 0.6);
        --text-main:      #f8fafc;
        --text-secondary: #94a3b8;
        --text-muted:     #64748b;
        --nav-bg:         rgba(10, 15, 22, 0.75);
        --glass-bg:       rgba(30, 41, 59, 0.5);
        --glass-border:   rgba(255, 255, 255, 0.1);
        --glass-blur:     blur(16px);
        --heading-color:  #ffffff;
        --btn-text:       #000000;
        --input-bg:       #1e293b;
        --shadow:         0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        --shadow-lg:      0 25px 50px -12px rgba(0, 0, 0, 0.7);
        --shadow-brand:   0 10px 20px -5px rgba(0, 210, 223, 0.25);
      }
      
      /* Glassmorphism Utility Class */
      .glass {
        background: var(--glass-bg) !important;
        backdrop-filter: var(--glass-blur) !important;
        -webkit-backdrop-filter: var(--glass-blur) !important;
        border: 1px solid var(--glass-border) !important;
      }

      * { box-sizing: border-box; }
      body { font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: var(--bg); background: var(--bg); color: var(--text-main); }
      *, input, button, select, textarea { font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; }

      /* ── Dark Mode Global Overrides ── */
      [data-theme="dark"] input,
      [data-theme="dark"] select,
      [data-theme="dark"] textarea {
        background: var(--input-bg) !important;
        color: var(--text-main) !important;
        border-color: var(--border) !important;
        backdrop-filter: blur(8px);
      }
      [data-theme="dark"] input::placeholder,
      [data-theme="dark"] textarea::placeholder { color: var(--text-muted) !important; }

      /* Danger button in dark mode */
      [data-theme="dark"] {
        --danger-bg:     #2d1515;
        --danger-text:   #f87171;
        --danger-border: #7f1d1d;
      }

      /* Ensure search result cards and hardcoded white backgrounds adapt */
      [data-theme="dark"] .search-card-bg { background: var(--card-bg) !important; backdrop-filter: blur(12px); }

      /* Fix hardcoded heading colors that appear across many components */
      [data-theme="dark"] h1, [data-theme="dark"] h2,
      [data-theme="dark"] h3, [data-theme="dark"] h4 {
        color: var(--heading-color);
      }

      /* Fix white card backgrounds used inline across the app */
      [data-theme="dark"] [style*="background: #fff"],
      [data-theme="dark"] [style*="background:#fff"],
      [data-theme="dark"] [style*="background: white"],
      [data-theme="dark"] [style*="background-color: #fff"],
      [data-theme="dark"] [style*="background-color:#fff"] {
        background: var(--card-bg) !important;
        backdrop-filter: blur(12px);
      }

      /* Fix hardcoded dark text on buttons and labels */
      [data-theme="dark"] button[style*="color: #0c4a6e"],
      [data-theme="dark"] div[style*="color: #0c4a6e"],
      [data-theme="dark"] h1[style*="color: #0c4a6e"],
      [data-theme="dark"] h2[style*="color: #0c4a6e"],
      [data-theme="dark"] h3[style*="color: #0c4a6e"],
      [data-theme="dark"] span[style*="color: #0c4a6e"] {
        color: var(--heading-color) !important;
      }
      [data-theme="dark"] div[style*="color: #1e293b"],
      [data-theme="dark"] div[style*="color: #0f172a"],
      [data-theme="dark"] div[style*="color: #111827"] {
        color: var(--text-main) !important;
      }

      /* Fix all remaining hardcoded dark text colors — comprehensive audit */
      [data-theme="dark"] [style*="color: #374151"],
      [data-theme="dark"] [style*="color: #334155"],
      [data-theme="dark"] [style*="color: #1e293b"],
      [data-theme="dark"] [style*="color: #1f2937"],
      [data-theme="dark"] [style*="color: #0f172a"],
      [data-theme="dark"] [style*="color: #111827"],
      [data-theme="dark"] [style*="color: #0c4a6e"],
      [data-theme="dark"] [style*="color: #4b5563"],
      [data-theme="dark"] [style*="color: #475569"] {
        color: var(--text-secondary) !important;
      }

      /* Fix --text-primary (typo/non-existent variable) — replace with correct var */
      [data-theme="dark"] [style*="--text-primary"] {
        color: var(--text-main) !important;
      }

      /* Fix hardcoded light backgrounds that disappear on dark */
      [data-theme="dark"] [style*="background: #f3f4f6"],
      [data-theme="dark"] [style*="background: #f1f5f9"],
      [data-theme="dark"] [style*="background: #f8fafc"],
      [data-theme="dark"] [style*="background: #f9fafb"],
      [data-theme="dark"] [style*="background-color: #f3f4f6"],
      [data-theme="dark"] [style*="background-color: #f9fafb"] {
        background: var(--bg) !important;
      }

      /* Fix hardcoded borders */
      [data-theme="dark"] [style*="border: 1px solid #f3f4f6"],
      [data-theme="dark"] [style*="border-bottom: 1px solid #f3f4f6"],
      [data-theme="dark"] [style*="borderBottom: 1px solid #f3f4f6"] {
        border-color: var(--border) !important;
      }

      @keyframes flipRight {
        0% { transform: perspective(400px) rotateY(0deg); }
        100% { transform: perspective(400px) rotateY(360deg); }
      }
      @keyframes flipLeft {
        0% { transform: perspective(400px) rotateY(0deg); }
        100% { transform: perspective(400px) rotateY(-360deg); }
      }
      @keyframes flipUp {
        0% { transform: perspective(400px) rotateX(0deg); }
        100% { transform: perspective(400px) rotateX(360deg); }
      }
      @keyframes flipDown {
        0% { transform: perspective(400px) rotateX(0deg); }
        100% { transform: perspective(400px) rotateX(-360deg); }
      }
      .flip-right { animation: flipRight 1s ease-in-out; }
      .flip-left  { animation: flipLeft 1s ease-in-out; }
      .flip-up    { animation: flipUp 1s ease-in-out; }
      .flip-down  { animation: flipDown 1s ease-in-out; }
      
      .random-flip-container {
        display: inline-block;
        transform-style: preserve-3d;
        -webkit-transform-style: preserve-3d;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg);
          }).catch(err => {
            console.log('SW reg failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
